definitions:
  HTTPError:
    properties:
      code:
        type: integer
      message:
        type: string
    type: object
  IpamAPIDeleteClusterRequest:
    properties:
      cluster_id:
        example: 123e4567-e89b-12d3-a456-426614174000
        type: string
    required:
    - cluster_id
    type: object
  IpamAPIRequest:
    properties:
      address:
        type: string
      ip_family:
        enum:
        - ipv4
        - ipv6
        example: ipv4
        type: string
      new_secret:
        type: string
      secret:
        example: a_secret_value
        maxLength: 64
        minLength: 8
        type: string
      service:
        $ref: '#/definitions/Service'
      zone:
        example: inet
        type: string
    required:
    - ip_family
    - secret
    - zone
    type: object
  IpamAPIResponse:
    properties:
      address:
        type: string
      cluster_id:
        type: string
      message:
        type: string
    type: object
  Service:
    properties:
      cluster_id:
        example: 123e4567-e89b-12d3-a456-426614174000
        type: string
      deny_external_cleanup:
        type: boolean
      expires_at:
        example: "2025-06-03 14:39:31.546230273"
        type: string
      namespace_id:
        example: 123e4567-e89b-12d3-a456-426614174000
        type: string
      retention_period_days:
        type: integer
      service_name:
        example: service1
        type: string
    required:
    - cluster_id
    - namespace_id
    - service_name
    type: object
info:
  contact: {}
paths:
  /address:
    post:
      consumes:
      - application/json
      description: Register an address in Vitistack IPAM API
      parameters:
      - description: Request body
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/IpamAPIRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/IpamAPIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/HTTPError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/HTTPError'
      summary: Register an address
      tags:
      - addresses
  /cluster:
    delete:
      consumes:
      - application/json
      description: Set expiration for a cluster
      parameters:
      - description: Request body
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/IpamAPIDeleteClusterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/IpamAPIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/HTTPError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/HTTPError'
      summary: Set expiration for a cluster
      tags:
      - addresses
  /service:
    delete:
      consumes:
      - application/json
      description: Set expiration for a service
      parameters:
      - description: Request body
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/IpamAPIRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/IpamAPIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/HTTPError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/HTTPError'
      summary: Set expiration for a service
      tags:
      - addresses
swagger: "2.0"
